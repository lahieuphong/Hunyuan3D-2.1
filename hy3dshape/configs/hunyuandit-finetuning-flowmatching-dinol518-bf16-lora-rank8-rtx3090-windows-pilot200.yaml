base_config: hunyuandit-finetuning-flowmatching-dinol518-bf16-lora-rank8-rtx3090-windows.yaml

name: "Hunyuan3D 2.1 Shape DiT LoRA; 200-step RTX 3090 Windows pilot"

# This pilot deliberately uses one optimizer update per batch. It is meant to
# prove learning and compare inference outputs on the bundled eight-object
# dataset, not to produce a general-purpose 2D-to-3D model.
training:
  steps: 200
  update_every: 1
  log_every_n_steps: 5
  val_check_interval: 50
  limit_val_batches: 1
  lora_save_every_n_steps: 50

# Zero workers are slower on some systems but make this first longer native
# Windows run deterministic to launch and easier to diagnose.
dataset:
  params:
    num_workers: 0
    val_num_workers: 0

model:
  params:
    optimizer_cfg:
      scheduler:
        params:
          warm_up_steps: 20
