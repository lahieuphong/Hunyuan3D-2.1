name: "Hunyuan3D 2.1 Shape DiT LoRA; single RTX 3090; native Windows"

# This is a pretrained LoRA fine-tune, not the random-weight mini model.
# A one-step OOM smoke test is still required before a long run.
training:
  steps: 10000
  num_nodes: 1
  update_every: 8
  use_amp: true
  amp_type: "bf16"
  base_lr: 5e-5
  gradient_clip_val: 1.0
  gradient_clip_algorithm: "norm"
  log_every_n_steps: 10
  every_n_train_steps: 500
  val_check_interval: 500
  limit_val_batches: 1
  monitor: "val/total_loss"
  monitor_mode: "min"

  # Full Lightning checkpoints contain the frozen 3.3B base model and are
  # intentionally disabled. Adapter snapshots are written under output/lora.
  save_full_checkpoint: false
  lora_save_every_n_steps: 500
  lora_save_on_train_epoch_end: false

dataset:
  target: hy3dshape.data.dit_asl.AlignedShapeLatentModule
  params:
    batch_size: 1
    num_workers: 2
    val_num_workers: 1

    train_data_list: tools/mini_trainset/preprocessed
    val_data_list: tools/mini_trainset/preprocessed

    cond_stage_key: "image"
    image_size: 518
    mean: [0.5, 0.5, 0.5]
    std: [0.5, 0.5, 0.5]

    # Keep the pretrained VAE-compatible point count and 4096 latent tokens.
    pc_size: 81920
    pc_sharpedge_size: 0
    sharpedge_label: true
    return_normal: true

    padding: true
    deterministic: false
    max_consecutive_failures: 16
    max_total_failures: 100

model:
  target: hy3dshape.models.diffusion.flow_matching_sit.Diffuser
  params:
    first_stage_key: "surface"
    cond_stage_key: "image"
    scale_by_std: false
    z_scale_factor: 1.0039506158752403
    torch_compile: false

    lora_config:
      rank: 8
      alpha: 16
      dropout: 0.05
      bias: "none"
      target_modules:
        - to_q
        - to_k
        - to_v
        - out_proj
      # Set this to an existing step_xxxxxxxx/final folder to continue from
      # adapter weights. Optimizer/global step restart when using this option.
      adapter_path: null

    first_stage_config:
      target: hy3dshape.models.autoencoders.ShapeVAE
      from_pretrained: tencent/Hunyuan3D-2.1
      params:
        pc_size: 81920
        pc_sharpedge_size: 0

    cond_stage_config:
      target: hy3dshape.models.conditioner.SingleImageEncoder
      params:
        drop_ratio: 0.1
        main_image_encoder:
          type: DinoImageEncoder
          kwargs:
            version: "facebook/dinov2-large"
            image_size: 518
            use_cls_token: true

    denoiser_cfg:
      target: hy3dshape.models.denoisers.hunyuandit.HunYuanDiTPlain
      from_pretrained: tencent/Hunyuan3D-2.1
      params:
        gradient_checkpointing: true

    scheduler_cfg:
      transport:
        target: hy3dshape.models.diffusion.transport.create_transport
        params:
          path_type: Linear
          prediction: velocity
      sampler:
        target: hy3dshape.models.diffusion.transport.Sampler
        params: {}
        ode_params:
          sampling_method: euler
          num_steps: 50

    optimizer_cfg:
      optimizer:
        target: torch.optim.AdamW
        params:
          betas: [0.9, 0.99]
          eps: 1.e-6
          weight_decay: 1.e-2
      scheduler:
        target: hy3dshape.utils.trainings.lr_scheduler.LambdaWarmUpCosineFactorScheduler
        params:
          warm_up_steps: 100
          f_start: 1.e-6
          f_min: 1.e-3
          f_max: 1.0

    pipeline_cfg:
      target: hy3dshape.pipelines.Hunyuan3DDiTFlowMatchingPipeline

    image_processor_cfg:
      target: hy3dshape.preprocessors.ImageProcessorV2
      params: {}

# Mesh-generation callbacks are intentionally omitted because they create a
# large VRAM spike and make single-GPU training much less stable.
