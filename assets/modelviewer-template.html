<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hunyuan3D-2mv · 3D Model Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.1.1/dist/model-viewer.min.js" type="module"></script>
    <script>
        if (window.self === window.top) {
            document.documentElement.classList.add('viewer-standalone');
        }
    </script>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            background: #090e19;
            height: 100%;
            margin: 0;
            overflow: hidden;
            width: 100%;
        }

        button {
            font: inherit;
        }

        .viewer-shell {
            background:
                radial-gradient(circle at 50% 34%, rgba(78, 91, 170, 0.16), transparent 34%),
                linear-gradient(180deg, #0d1321 0%, #090e19 100%);
            border: 1px solid #252d40;
            border-radius: 11px;
            height: var(--viewer-height, 650px);
            isolation: isolate;
            overflow: hidden;
            position: relative;
            width: 100%;
        }

        html.viewer-standalone .viewer-shell,
        .viewer-shell:fullscreen {
            border: 0;
            border-radius: 0;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
        }

        .viewer-shell::before {
            background: radial-gradient(circle, rgba(121, 134, 255, 0.09), transparent 62%);
            content: "";
            height: 58%;
            left: 22%;
            pointer-events: none;
            position: absolute;
            top: 12%;
            width: 56%;
            z-index: 0;
        }

        .viewer-floor {
            background-image:
                linear-gradient(rgba(91, 108, 196, 0.72) 1px, transparent 1px),
                linear-gradient(90deg, rgba(91, 108, 196, 0.72) 1px, transparent 1px);
            background-size: 34px 34px;
            bottom: 12%;
            height: 48%;
            left: 8%;
            -webkit-mask-image: radial-gradient(ellipse at center, #000 28%, transparent 72%);
            mask-image: radial-gradient(ellipse at center, #000 28%, transparent 72%);
            opacity: 0.55;
            pointer-events: none;
            position: absolute;
            transform: perspective(520px) rotateX(64deg);
            transform-origin: center bottom;
            transition: opacity 180ms ease;
            width: 84%;
            z-index: 0;
        }

        .viewer-shell.grid-hidden .viewer-floor {
            opacity: 0;
        }

        model-viewer {
            background: transparent;
            height: 100%;
            inset: 0;
            position: absolute;
            width: 100%;
            z-index: 1;
            --poster-color: transparent;
            --progress-bar-color: #6670ff;
        }

        model-viewer::part(default-progress-bar) {
            background: linear-gradient(90deg, #5360ef, #8087ff);
            height: 3px;
        }

        model-viewer::part(default-ar-button) {
            bottom: 86px;
            right: 14px;
        }

        .viewer-overlay,
        .viewer-toolbar,
        .camera-strip {
            position: absolute;
            z-index: 3;
        }

        .viewer-overlay {
            align-items: center;
            color: #929bb0;
            display: flex;
            font-size: 11px;
            gap: 9px;
            left: 14px;
            top: 14px;
        }

        .preview-badge {
            align-items: center;
            background: rgba(29, 151, 92, 0.12);
            border: 1px solid rgba(42, 196, 116, 0.28);
            border-radius: 999px;
            color: #54dc91;
            display: inline-flex;
            font-size: 10px;
            font-weight: 720;
            gap: 5px;
            padding: 5px 8px;
        }

        .preview-badge::before {
            background: currentColor;
            border-radius: 999px;
            content: "";
            height: 5px;
            width: 5px;
        }

        .viewer-help-separator {
            color: #4f596e;
        }

        .viewer-toolbar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            right: 13px;
            top: 14px;
        }

        .viewer-tool {
            align-items: center;
            background: rgba(15, 20, 33, 0.9);
            border: 1px solid #2a3349;
            border-radius: 8px;
            color: #aeb6c9;
            cursor: pointer;
            display: inline-flex;
            height: 34px;
            justify-content: center;
            padding: 0;
            transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
            width: 34px;
        }

        .viewer-tool:hover,
        .viewer-tool[aria-pressed="true"] {
            background: #1a2134;
            border-color: #5964df;
            color: #fff;
        }

        .viewer-icon {
            fill: none;
            height: 15px;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-width: 1.65;
            width: 15px;
        }

        .camera-strip {
            align-items: stretch;
            bottom: 12px;
            display: grid;
            gap: 6px;
            grid-template-columns: repeat(6, minmax(54px, 1fr));
            left: 50%;
            max-width: min(82%, 510px);
            transform: translateX(-50%);
            width: 510px;
        }

        .camera-preset {
            align-items: center;
            background: rgba(14, 19, 32, 0.92);
            border: 1px solid #293249;
            border-radius: 7px;
            color: #8f98ad;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            font-size: 10px;
            font-weight: 650;
            gap: 3px;
            justify-content: center;
            min-height: 64px;
            padding: 6px;
            transition: border-color 160ms ease, background 160ms ease, color 160ms ease, transform 160ms ease;
        }

        .camera-preset:hover,
        .camera-preset.is-active {
            background: rgba(25, 31, 50, 0.96);
            border-color: #6670ff;
            color: #dfe3ff;
            transform: translateY(-1px);
        }

        .camera-preset .viewer-icon {
            height: 18px;
            width: 18px;
        }

        @media (max-width: 720px) {
            .viewer-help-text,
            .viewer-help-separator {
                display: none;
            }

            .camera-strip {
                gap: 4px;
                grid-template-columns: repeat(6, minmax(0, 1fr));
                max-width: calc(100% - 24px);
                width: min(510px, calc(100% - 24px));
            }

            .camera-preset {
                min-height: 56px;
                padding: 4px;
            }

            .camera-preset .viewer-icon {
                height: 16px;
                width: 16px;
            }
        }
    </style>
</head>
<body>
    <main id="viewer-shell" class="viewer-shell">
        <div id="viewer-floor" class="viewer-floor" aria-hidden="true"></div>
        <model-viewer
            id="modelviewer"
            src="#src#"
            alt="Generated 3D mesh preview"
            camera-target="auto auto auto"
            camera-orbit="0deg 75deg 160%"
            max-camera-orbit="auto 180deg 300%"
            environment-image="neutral"
            interaction-prompt="none"
            orientation="0deg 0deg 0deg"
            rotation-per-second="10deg"
            shadow-intensity=".9"
            camera-controls
            ar
            disable-tap>
        </model-viewer>

        <div class="viewer-overlay" aria-hidden="true">
            <span class="preview-badge">Preview</span>
            <span class="viewer-help-text">Click and drag to rotate</span>
            <span class="viewer-help-separator">•</span>
            <span class="viewer-help-text">Scroll to zoom</span>
        </div>

        <div class="viewer-toolbar" aria-label="Viewer controls">
            <button class="viewer-tool" type="button" data-action="fullscreen" data-icon="maximize" aria-label="Fullscreen"></button>
            <button class="viewer-tool" type="button" data-action="reset" data-icon="reset" aria-label="Reset camera"></button>
            <button class="viewer-tool" type="button" data-action="rotate" data-icon="rotate" aria-label="Toggle auto rotate" aria-pressed="false"></button>
            <button class="viewer-tool" type="button" data-action="grid" data-icon="grid" aria-label="Toggle floor grid" aria-pressed="true"></button>
        </div>

        <div class="camera-strip" role="group" aria-label="Camera presets">
            <button class="camera-preset is-active" type="button" data-orbit="0deg 75deg 160%" data-icon="box" aria-pressed="true"><span>Front</span></button>
            <button class="camera-preset" type="button" data-orbit="35deg 75deg 160%" data-icon="box" aria-pressed="false"><span>Front-right ¾</span></button>
            <button class="camera-preset" type="button" data-orbit="90deg 75deg 160%" data-icon="box" aria-pressed="false"><span>Right</span></button>
            <button class="camera-preset" type="button" data-orbit="180deg 75deg 160%" data-icon="box" aria-pressed="false"><span>Back</span></button>
            <button class="camera-preset" type="button" data-orbit="-90deg 75deg 160%" data-icon="box" aria-pressed="false"><span>Left</span></button>
            <button class="camera-preset" type="button" data-orbit="-35deg 75deg 160%" data-icon="box" aria-pressed="false"><span>Front-left ¾</span></button>
        </div>
    </main>

    <script>
        const iconPaths = {
            box: '<path d="m3 8 9-5 9 5-9 5-9-5Z"></path><path d="m3 8v8l9 5 9-5V8"></path><path d="M12 13v8"></path>',
            maximize: '<path d="M8 3H3v5"></path><path d="m3 3 6 6"></path><path d="M16 3h5v5"></path><path d="m21 3-6 6"></path><path d="M8 21H3v-5"></path><path d="m3 21 6-6"></path><path d="M16 21h5v-5"></path><path d="m21 21-6-6"></path>',
            reset: '<path d="M3 12a9 9 0 1 0 3-6.7"></path><path d="M3 4v6h6"></path>',
            rotate: '<path d="M21 12a9 9 0 0 1-15.2 6.5"></path><path d="M3 12A9 9 0 0 1 18.2 5.5"></path><path d="M18 2v4h4"></path><path d="M6 22v-4H2"></path>',
            grid: '<rect x="3" y="3" width="18" height="18" rx="2"></rect><path d="M3 9h18M3 15h18M9 3v18M15 3v18"></path>',
        };

        const iconMarkup = (name) => {
            const paths = iconPaths[name];
            return paths
                ? '<svg class="viewer-icon" viewBox="0 0 24 24" aria-hidden="true">' + paths + '</svg>'
                : '';
        };

        document.querySelectorAll('[data-icon]').forEach((element) => {
            element.insertAdjacentHTML('afterbegin', iconMarkup(element.dataset.icon));
        });

        const shell = document.getElementById('viewer-shell');
        const modelViewer = document.getElementById('modelviewer');
        const DEFAULT_CAMERA_ORBIT = '0deg 75deg 160%';
        const GROUND_TARGET_OFFSET_RATIO = 0;

        const getGroundedCameraTarget = () => {
            const center = modelViewer.getBoundingBoxCenter?.();
            const dimensions = modelViewer.getDimensions?.();
            if (!center || !dimensions || !Number.isFinite(dimensions.y) || dimensions.y <= 0) {
                return 'auto auto auto';
            }

            const targetY = center.y - dimensions.y * GROUND_TARGET_OFFSET_RATIO;
            return `${center.x}m ${targetY}m ${center.z}m`;
        };

        const applyCamera = (orbit) => {
            modelViewer.setAttribute('camera-target', getGroundedCameraTarget());
            modelViewer.setAttribute('camera-orbit', orbit);
            modelViewer.jumpCameraToGoal?.();
        };

        const resetCamera = () => {
            applyCamera(DEFAULT_CAMERA_ORBIT);
            document.querySelectorAll('.camera-preset').forEach((button, index) => {
                button.classList.toggle('is-active', index === 0);
                button.setAttribute('aria-pressed', String(index === 0));
            });
        };

        modelViewer.addEventListener('load', () => {
            modelViewer.setAttribute('environment-image', '/static/env_maps/gradient.jpg');
            resetCamera();
        }, {once: true});

        document.querySelector('[data-action="fullscreen"]').addEventListener('click', async () => {
            if (document.fullscreenElement) {
                await document.exitFullscreen?.();
            } else {
                await shell.requestFullscreen?.();
            }
        });

        document.querySelector('[data-action="reset"]').addEventListener('click', resetCamera);

        document.querySelector('[data-action="rotate"]').addEventListener('click', (event) => {
            const enabled = !modelViewer.hasAttribute('auto-rotate');
            modelViewer.toggleAttribute('auto-rotate', enabled);
            event.currentTarget.setAttribute('aria-pressed', String(enabled));
        });

        document.querySelector('[data-action="grid"]').addEventListener('click', (event) => {
            const visible = shell.classList.toggle('grid-hidden') === false;
            event.currentTarget.setAttribute('aria-pressed', String(visible));
        });

        document.querySelectorAll('.camera-preset').forEach((button) => {
            button.addEventListener('click', () => {
                modelViewer.removeAttribute('auto-rotate');
                document.querySelector('[data-action="rotate"]').setAttribute('aria-pressed', 'false');
                applyCamera(button.dataset.orbit);
                document.querySelectorAll('.camera-preset').forEach((item) => {
                    item.classList.toggle('is-active', item === button);
                    item.setAttribute('aria-pressed', String(item === button));
                });
            });
        });
    </script>
</body>
</html>
