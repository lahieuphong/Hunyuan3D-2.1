<!DOCTYPE html>
<html>

<head>
    <!-- Import the component -->
    <script src="https://cdn.jsdelivr.net/npm/@google/model-viewer@3.1.1/dist/model-viewer.min.js" type="module"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const modelViewers = document.querySelectorAll('model-viewer');
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

            modelViewers.forEach(modelViewer => {
                modelViewer.setAttribute(
                    "environment-image",
                    "/static/env_maps/gradient.jpg"
                );
                const frameEntireModel = () => {
                    modelViewer.cameraTarget = "auto auto auto";
                    modelViewer.cameraOrbit = "0deg 75deg 125%";
                    if (typeof modelViewer.jumpCameraToGoal === "function") {
                        modelViewer.jumpCameraToGoal();
                    }
                };
                modelViewer.addEventListener("load", frameEntireModel, {once: true});

                //         color = color.map(x => x / 255);
                //         material.pbrMetallicRoughness.setMetallicFactor(0.1); // 完全金属
                //         material.pbrMetallicRoughness.setRoughnessFactor(0.7); // 低粗糙度
                //         material.pbrMetallicRoughness.setBaseColorFactor(color);  // CornflowerBlue in RGB
                //     });
                // }

                //     let color = [43, 44, 46, 255];
                //     color = color.map(x => x / 255);
                //     material.pbrMetallicRoughness.setMetallicFactor(0.1); // 完全金属

                //     material.pbrMetallicRoughness.setBaseColorFactor(color);  // CornflowerBlue in RGB

            });
        });
    </script>

    <style>
        html,
        body {
            background: #0b0d11;
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .centered-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border-radius: 8px;
            border-color: #30343d;
            border-style: solid;
            border-width: 1px;
        }

        .column {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
<div class="centered-container">
    <div class="column is-mobile is-centered">
        <model-viewer id="modelviewer" style="height: #height#px; width: 100%;"
                      rotation-per-second="10deg"
                      src="#src#" disable-tap
                      environment-image="neutral"
                      camera-target="auto auto auto"
                      camera-orbit="0deg 75deg 125%"
                      orientation="0deg 0deg 0deg"
                      shadow-intensity=".9"
                      ar auto-rotate
                      camera-controls>
        </model-viewer>
    </div>
</div>
</body>

</html>
